# Local services for L2 E2E tests.
# Usage:
#   docker compose up -d qdrant
#   docker compose up -d --build sandbox
#
# Tear down: docker compose down -v

services:
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: aaps-qdrant
    ports:
      - "6333:6333"   # REST
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Sandbox container intentionally has no entrypoint server.
  # Tests `docker exec` into it for tool execution.
  sandbox:
    build:
      context: ../docker/sandbox
    container_name: aaps-sandbox
    command: ["sleep", "infinity"]
    tty: true

volumes:
  qdrant_storage:
